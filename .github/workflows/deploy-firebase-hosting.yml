name: Deploy Frontend To Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Write .env from GitHub secret
        shell: bash
        env:
          SECRETS_ENV: ${{ secrets.SECRETS_ENV }}
        run: |
          printf '%s' "$SECRETS_ENV" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend
        shell: bash
        run: |
          set -a
          source .env
          set +a
          npm run build:hosting

      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          set -a
          source .env
          set +a
          npx firebase-tools deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"
