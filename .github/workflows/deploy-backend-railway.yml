name: Deploy Backend To Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Write .env from GitHub secret
        shell: bash
        env:
          SECRETS_ENV: ${{ secrets.SECRETS_ENV }}
        run: |
          printf '%s' "$SECRETS_ENV" > .env

      - name: Export .env to workflow environment
        shell: bash
        run: |
          grep -Ev '^[[:space:]]*($|#)' .env >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy to Railway
        uses: railwayapp/railway-deploy@v3
        with:
          railway_token: ${{ env.RAILWAY_TOKEN }}
          service: ${{ env.RAILWAY_SERVICE }}
          environment: ${{ env.RAILWAY_ENVIRONMENT }}
          project: ${{ env.RAILWAY_PROJECT_ID }}
          detach: true
