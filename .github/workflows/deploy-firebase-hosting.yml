name: Deploy Frontend To Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Write .env from GitHub secret
        shell: bash
        env:
          SECRETS_ENV: ${{ secrets.SECRETS_ENV }}
        run: |
          printf '%s' "$SECRETS_ENV" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend
        shell: bash
        run: |
          FRONTEND_API_BASE_URL="$(sed -n 's/^FRONTEND_API_BASE_URL=//p' .env | head -n1)"
          export FRONTEND_API_BASE_URL
          npm run build:hosting

      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          FIREBASE_PROJECT_ID="$(sed -n 's/^FIREBASE_PROJECT_ID=//p' .env | head -n1)"
          FIREBASE_TOKEN="$(sed -n 's/^FIREBASE_TOKEN=//p' .env | head -n1)"
          npx firebase-tools deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"

      - name: Remove temporary .env
        if: always()
        run: rm -f .env
