version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/crime_map.sqlite
      # Use Crawl4AI instead of Browserless
      - CRAWL4AI_URL=http://crawl4ai:11235
      - CRAWL4AI_TOKEN=${CRAWL4AI_TOKEN:-}
      # Remove or leave empty: BROWSERLESS_API_KEY
      - BROWSERLESS_API_KEY=
      # Other config
      - INGEST_CRON=0 * * * *
      - RSS_MAX_ITEMS_PER_FEED=25
      - INGEST_MAX_ITEMS_PER_SOURCE=25
      - MANUAL_INGEST_LOOKBACK_HOURS=24
      - PIPELINE_MODE=semantic
      - SEMANTIC_PUBLISH_THRESHOLD=0.65
      # AWS Bedrock
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK:-}
      # Qdrant
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - ./data:/app/data
    depends_on:
      - crawl4ai
      - qdrant
    restart: unless-stopped

  # Crawl4AI - Free, open-source web crawler
  crawl4ai:
    image: unclecode/crawl4ai:latest
    ports:
      - "11235:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_TOKEN:-}
      - MAX_CONCURRENT_CRAWLS=5
      - DEFAULT_TIMEOUT=30000
    volumes:
      - crawl4ai-cache:/app/.crawl4ai
    restart: unless-stopped
    # Resource limits for the crawler
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Qdrant - Vector database for semantic search
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped

volumes:
  crawl4ai-cache:
  qdrant-storage:
