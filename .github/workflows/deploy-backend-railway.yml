name: Deploy Backend To Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Write .env from GitHub secret
        shell: bash
        env:
          SECRETS_ENV: ${{ secrets.SECRETS_ENV }}
        run: |
          printf '%s' "$SECRETS_ENV" > .env

      - name: Export .env to workflow environment
        shell: bash
        run: |
          grep -Ev '^[[:space:]]*($|#)' .env >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Deploy to Railway
        env:
          NPM_CONFIG_CACHE: ${{ github.workspace }}/.npm-cache
          RAILWAY_TOKEN: ${{ env.RAILWAY_TOKEN }}
        run: >
          npx -y @railway/cli up --ci --detach
          --service "$RAILWAY_SERVICE"
          --environment "$RAILWAY_ENVIRONMENT"
          --project "$RAILWAY_PROJECT_ID"
