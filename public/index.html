<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chennai Crime Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="map"></div>
    <div class="map-hud">
      <aside class="control-panel" id="control-panel">
        <div class="control-panel__eyebrow">Live filter widget</div>
        <div class="control-panel__title-row">
          <div>
            <h1>Chennai Crime Map</h1>
            <p>Dial time and category filters without leaving the map.</p>
          </div>
          <button class="ghost-button" id="reset-filters" type="button">Reset</button>
        </div>

        <section class="filter-section" aria-labelledby="time-filter-label">
          <div class="filter-section__header">
            <div>
              <h2 id="time-filter-label">Time slider</h2>
              <p>Jump between 24 hours, 7 days, 30 days, or a custom range.</p>
            </div>
            <span class="filter-badge" id="time-range-label">Last 30 days</span>
          </div>

          <div class="time-slider-card">
            <input
              id="time-slider"
              class="time-slider"
              type="range"
              min="0"
              max="3"
              step="1"
              value="2"
              aria-label="Time range slider"
            />
            <div class="time-option-row" role="tablist" aria-label="Time presets">
              <button class="time-option" data-preset="24h" type="button">24h</button>
              <button class="time-option" data-preset="7d" type="button">7d</button>
              <button class="time-option is-active" data-preset="30d" type="button">30d</button>
              <button class="time-option" data-preset="custom" type="button">Custom</button>
            </div>
          </div>

          <div class="custom-range" id="custom-range" hidden>
            <label class="field">
              <span>From</span>
              <input id="custom-from" type="datetime-local" />
            </label>
            <label class="field">
              <span>To</span>
              <input id="custom-to" type="datetime-local" />
            </label>
            <button class="apply-button" id="apply-custom-range" type="button">Apply range</button>
          </div>
        </section>

        <section class="filter-section" aria-labelledby="category-filter-label">
          <div class="filter-section__header">
            <div>
              <h2 id="category-filter-label">Category toggles</h2>
              <p>Quickly switch offense types on or off.</p>
            </div>
            <span class="filter-badge" id="category-count-label">8 active</span>
          </div>

          <div class="category-toggle-grid" id="category-toggles"></div>
        </section>

        <footer class="control-panel__footer">
          <div class="results-summary" id="results-summary">Loading incidents...</div>
          <div class="filter-status" id="filter-status">Preparing map data...</div>
        </footer>
      </aside>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
